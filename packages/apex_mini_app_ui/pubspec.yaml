name: mini_app_ui
description: mini app SDK-ийн Flutter runtime багц.
version: 0.1.0
publish_to: none

environment:
 sdk: ^3.10.1
 flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.9
  mini_app_core:
    path: ../apex_mini_app_core
  adaptive_platform_ui: ^0.1.104

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  fonts:
    - family: Zona Pro
      fonts:
        - asset: assets/fonts/Zona-Pro/ZonaPro-Regular.ttf
          weight: 400
        - asset: assets/fonts/Zona-Pro/ZonaPro-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Zona-Pro/ZonaPro-Bold.otf
          weight: 700
